<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>

<style>
/* REMOVE ALL DEFAULT SPACING */
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    background: transparent;
}

/* Main Wrapper */
.wrapper {
    padding: 0;
    margin: 0;
    width: 100%;
}

/* CONTAINER REMOVED TOP MARGINS */
.container {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 5px 10px;
}

/* TILE GRID */
.tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
}

/* TILE */
.tile {
    position: relative;
    height: 160px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    transition: transform 0.25s ease;
}

.tile:hover {
    transform: scale(1.03);
}

.tile-overlay {
    position: absolute;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.38);
}

.tile-text {
    position: absolute;
    bottom: 12px;
    left: 15px;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
}

/* MODAL + BLUR */
#pageBlur {
    transition: filter 0.25s ease;
}
body.modal-open #pageBlur {
    filter: blur(6px);
}

/* Modal Background */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(5px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

/* Modal Box */
.modal-box {
    width: 75%;
    max-width: 900px;
    background: #ffffffea;
    padding: 28px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    animation: slideUp 0.35s ease;
}

.close-btn {
    float: right;
    font-size: 22px;
    cursor: pointer;
    font-weight: bold;
    color: #222;
}

/* Animation */
@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div id="pageBlur" class="wrapper">

    <div class="container">
        <div class="tile-grid">

            <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');"
                 onclick="openModal('objectives')">
                <div class="tile-overlay"></div>
                <div class="tile-text">BTIS AEX Objectives</div>
            </div>

            <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d');"
                 onclick="openModal('whatis')">
                <div class="tile-overlay"></div>
                <div class="tile-text">What is AEX?</div>
            </div>

            <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1551288049-bebda4e38f71');"
                 onclick="openModal('analytics')">
                <div class="tile-overlay"></div>
                <div class="tile-text">Analytics</div>
            </div>

            <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa');"
                 onclick="openModal('pilot')">
                <div class="tile-overlay"></div>
                <div class="tile-text">About Pilot Launch</div>
            </div>

            <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d');"
                 onclick="openModal('team')">
                <div class="tile-overlay"></div>
                <div class="tile-text">Meet the Team</div>
            </div>

        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">✖</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
const modalData = {

    objectives: `
        <h2>BTIS AEX Objectives</h2>
        <p>
            The AEX model delivers a Zero‑Touch Service Desk experience by automating and orchestrating
            end‑user interactions across incidents, requests, knowledge workflows, and remediation.
        </p>
        <ul>
            <li>Enable high-volume automation</li>
            <li>Deliver consistent user journeys</li>
            <li>Drive operational efficiency</li>
        </ul>
    `,

    whatis: `
        <h2>What is AEX?</h2>
        <p>
            AEX is an enterprise automation and experience orchestration platform that simplifies and
            accelerates end-user support interactions.
        </p>
    `,

    analytics: `
        <h2>Analytics</h2>
        <p>
            Analytics provides insights into automation performance, user behavior, and the interaction
            patterns that help optimize AEX capability.
        </p>
    `,

    pilot: `
        <h2>About Pilot Launch</h2>
        <p>
            The pilot rollout validated automation flows, user experience, and performance benchmarks 
            before scaling across the enterprise.
        </p>
    `,

    team: `
        <h2>Meet the Team</h2>
        <p>
            The implementation team brings together automation specialists, UX designers, solution 
            architects, and platform engineers.
        </p>
    `
};

function openModal(key) {
    document.getElementById("modalContent").innerHTML = modalData[key];
    document.getElementById("modalOverlay").style.display = "flex";
    document.body.classList.add("modal-open");
}

function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
    document.body.classList.remove("modal-open");
}
</script>

</body>
</html>
